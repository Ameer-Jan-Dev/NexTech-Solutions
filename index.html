<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <!-- FontAwesome cnd -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Login Page</title>
  </head>
  <body>
    <div class="container">
      <div class="form-container">
        <h2><i class="fa-brands fa-artstation"></i> NexTech</h2>
        <div class="form-group">
          <form action="home.html" class="form-class">
            <div class="form-label">
              <label class="labeled" for="email">Email Address</label>
              <input required type="email" id="email" />
            </div>

            <div class="form-label">
              <label class="password" for="pass">Password</label>
              <input required id="pass" type="password" />
            </div>

            <div class="checkbox">
              <label class="me-label">
                <input type="checkbox" />
                <span>Remember me</span>
              </label>
              <a href="#">Forgot Password?</a>
            </div>

            <div>
              <input type="submit" value="Login" class="btn" />
            </div>

            <div class="bottom-form">
              <p>Do you have an account?</p>
              <a href="#">Signup now</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
